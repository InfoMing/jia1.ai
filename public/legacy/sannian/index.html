<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111111" />
    <meta name="description" content="三年之约 · 刺猬星球漫画体验" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%E2%88%9E%3C/text%3E%3C/svg%3E" />
    <title>三年之约</title>
    <link rel="stylesheet" href="/sannian/styles.css?v=20260609" />
  </head>
  <body>
    <main class="experience" aria-label="三年之约漫画">
      <div class="smoke-background" id="smokeBackground" aria-hidden="true"></div>
      <section class="book" id="book" aria-live="polite">
        <div class="page page--under" aria-hidden="true">
          <video class="page__video" muted playsinline webkit-playsinline x5-playsinline preload="auto" disablepictureinpicture disableremoteplayback></video>
        </div>

        <div class="page page--turning">
          <div class="page__face page__face--front">
            <video class="page__video" muted playsinline webkit-playsinline x5-playsinline preload="auto" disablepictureinpicture disableremoteplayback></video>
            <div class="population-bubble" id="populationBubble" aria-label="实时人数">
              <img src="" alt="" aria-hidden="true" />
              <span class="population-bubble__number" id="populationNumber">0</span>
            </div>
            <div class="page__edge"></div>
          </div>
          <div class="page__face page__face--back" aria-hidden="true">
            <div class="page__back-art"></div>
            <div class="page__back-shade"></div>
          </div>
        </div>

        <canvas class="curl-canvas" id="curlCanvas" aria-hidden="true"></canvas>
        <div class="book__fold-shadow" aria-hidden="true"></div>
        <div class="book__hint" id="hint" aria-hidden="true">
          <span></span>
          <b>往左滑翻页</b>
        </div>

        <button class="sound" id="soundButton" type="button" aria-label="关闭背景音乐">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 9v6h4l5 4V5L8 9H4Zm12.4.1a4 4 0 0 1 0 5.8M19 6.5a8 8 0 0 1 0 11" />
          </svg>
        </button>

        <div class="progress" id="progress" aria-label="页码"></div>

        <button
          class="invitation"
          id="invitationButton"
          type="button"
          aria-label="接受邀约，加入三年之约"
          data-url=""
        >
          <img src="" alt="接受邀约，加入三年之约" />
        </button>

        <div class="ending-actions" id="endingActions">
          <button class="ending-action ending-action--replay" id="restartButton" type="button">
            从头再看
          </button>
          <button class="ending-action" id="homeButton" type="button" data-url="/">
            返回网站首页
          </button>
        </div>

        <div class="ticket-overlay" id="ticketOverlay" aria-hidden="true">
          <img src="" alt="三年之约票券" />
        </div>
      </section>

      <button class="start" id="startButton" type="button">
        <span class="start__mark">∞</span>
        <span class="start__title">三年之约</span>
        <span class="start__action">点击任意处开启</span>
      </button>

      <audio id="music" src="" loop preload="auto" autoplay></audio>
      <audio id="ticketMusic" src="" loop preload="auto"></audio>
    </main>

    <div class="rotate-tip" aria-hidden="true">请将手机竖屏以获得最佳阅读体验</div>

    <script type="module" src="/sannian/bg-smoke.js?v=20260609"></script>
    <script src="/sannian/app.js?v=20260609"></script>
  </body>
</html>
